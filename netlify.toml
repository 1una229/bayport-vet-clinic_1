# Monorepo: static UI is bayport-vet-clinic/ (index.html, assets/, …)
# Netlify site env → BAYPORT_API_BASE=https://YOUR-APP.onrender.com/api

[build]
  base = "bayport-vet-clinic"
  command = "node scripts/write-deploy-env.js"
  publish = "."

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."api-proxy"]
  timeout = 26

# Same-origin API — browser calls /api/* on Netlify; function forwards to Render.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api-proxy/:splat"
  status = 200
  force = true

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Enforce HTTPS and basic security headers (site is already on TLS via Netlify).
[[redirects]]
  from = "http://*"
  to = "https://:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
